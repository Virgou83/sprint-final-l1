<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprint Final · Ligue 1 2025/2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   VARIABLES & RESET
═══════════════════════════════════════════════════ */
:root {
  --bg:        #07090f;
  --bg2:       #0d1117;
  --glass:     rgba(255,255,255,0.045);
  --glass-b:   rgba(255,255,255,0.09);
  --border:    rgba(255,255,255,0.08);
  --border-h:  rgba(255,255,255,0.18);
  --text:      #e8eaf0;
  --muted:     rgba(232,234,240,0.45);
  --win:       #22c55e;
  --win-bg:    rgba(34,197,94,0.15);
  --draw:      #f59e0b;
  --draw-bg:   rgba(245,158,11,0.15);
  --loss:      #ef4444;
  --loss-bg:   rgba(239,68,68,0.15);
  --gold:      #fbbf24;
  --silver:    #94a3b8;
  --bronze:    #cd7f32;
  --blue:      #3b82f6;
  --blue-bg:   rgba(59,130,246,0.15);
  --accent:    #6366f1;
  --r: 16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ═══════════════════════════════════════════════════
   BACKGROUND AMBIANCE
═══════════════════════════════════════════════════ */
.bg-orbs {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.12;
  animation: drift 20s ease-in-out infinite;
}
.orb-1 { width: 600px; height: 600px; background: #6366f1; top: -200px; left: -100px; animation-delay: 0s; }
.orb-2 { width: 500px; height: 500px; background: #0ea5e9; bottom: -150px; right: -100px; animation-delay: -7s; }
.orb-3 { width: 400px; height: 400px; background: #8b5cf6; top: 40%; left: 40%; animation-delay: -14s; }

@keyframes drift {
  0%, 100% { transform: translate(0,0) scale(1); }
  33%       { transform: translate(40px,-30px) scale(1.05); }
  66%       { transform: translate(-20px,20px) scale(0.95); }
}

/* ═══════════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════════ */
.wrapper {
  position: relative;
  z-index: 1;
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

/* ═══════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════ */
header {
  padding: 48px 0 40px;
  text-align: center;
}
.header-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 6px 16px;
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 20px;
  backdrop-filter: blur(12px);
}
.pulse {
  width: 6px; height: 6px;
  background: var(--win);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.4; transform: scale(0.8); }
}
h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1.1;
  background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.5) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-sub {
  margin-top: 10px;
  font-size: 15px;
  color: var(--muted);
  font-weight: 300;
}
.last-update {
  margin-top: 14px;
  font-size: 12px;
  color: rgba(232,234,240,0.3);
}

/* ═══════════════════════════════════════════════════
   GLASS CARD
═══════════════════════════════════════════════════ */
.glass {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: var(--r);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

/* ═══════════════════════════════════════════════════
   SECTION TITLES
═══════════════════════════════════════════════════ */
.section-title {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
}

/* ═══════════════════════════════════════════════════
   CLASSEMENT
═══════════════════════════════════════════════════ */
#ranking-section { margin-bottom: 48px; }

#ranking-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.rank-item {
  display: grid;
  grid-template-columns: 40px 1fr auto auto;
  align-items: center;
  gap: 16px;
  padding: 14px 20px;
  border-radius: 12px;
  transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  will-change: transform;
}
.rank-item:hover {
  background: var(--glass-b);
  border-color: var(--border-h);
}

.rank-num {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 800;
  text-align: center;
  color: var(--muted);
}
.rank-num.gold   { color: var(--gold); }
.rank-num.silver { color: var(--silver); }
.rank-num.bronze { color: var(--bronze); }

.rank-club {
  display: flex;
  align-items: center;
  gap: 12px;
}
.club-badge {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.rank-name {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
}
.rank-zone {
  font-size: 10px;
  color: var(--muted);
  font-weight: 400;
  margin-top: 2px;
}

.rank-pts-col {
  text-align: right;
}
.rank-pts {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 800;
  transition: color 0.4s;
  position: relative;
  display: inline-block;
}

.rank-delta {
  font-size: 10px;
  text-align: right;
  color: var(--muted);
  margin-top: 2px;
}

.rank-proj {
  text-align: right;
}
.proj-label {
  font-size: 10px;
  color: var(--muted);
}
.proj-val {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: rgba(255,255,255,0.5);
}

/* Séparateurs de zone */
.rank-item.zone-cl   { border-left: 3px solid #3b82f6; }
.rank-item.zone-cl4  { border-left: 3px solid #0ea5e9; }
.rank-item.zone-el   { border-left: 3px solid #f59e0b; }
.rank-item.zone-conf { border-left: 3px solid #8b5cf6; }
.rank-item.zone-out  { border-left: 3px solid transparent; }

/* Animation +pts */
.pts-bump {
  animation: ptsBump 1.2s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes ptsBump {
  0%   { transform: scale(1);    color: var(--text); }
  30%  { transform: scale(1.4);  color: var(--win); }
  60%  { transform: scale(1.15); color: var(--win); }
  100% { transform: scale(1);    color: var(--text); }
}

.pts-badge {
  position: absolute;
  top: -18px;
  right: 0;
  font-size: 11px;
  font-weight: 700;
  color: var(--win);
  background: var(--win-bg);
  border: 1px solid rgba(34,197,94,0.3);
  border-radius: 100px;
  padding: 2px 7px;
  white-space: nowrap;
  animation: badgePop 1.8s ease forwards;
  pointer-events: none;
}
@keyframes badgePop {
  0%   { opacity: 0; transform: translateY(6px) scale(0.8); }
  20%  { opacity: 1; transform: translateY(0) scale(1); }
  70%  { opacity: 1; }
  100% { opacity: 0; transform: translateY(-8px); }
}

/* ═══════════════════════════════════════════════════
   CALENDRIER
═══════════════════════════════════════════════════ */
#calendar-section { margin-bottom: 48px; }

.calendar-scroll {
  overflow-x: auto;
  padding-bottom: 8px;
}
.calendar-scroll::-webkit-scrollbar { height: 4px; }
.calendar-scroll::-webkit-scrollbar-track { background: transparent; }
.calendar-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.calendar-grid {
  display: grid;
  min-width: 900px;
}
.cal-header {
  display: grid;
  grid-template-columns: 80px repeat(8, 1fr);
  gap: 6px;
  margin-bottom: 6px;
}
.cal-club-head {
  padding: 10px 8px;
  text-align: center;
  border-radius: 10px;
}
.cal-club-head .badge-emoji { font-size: 20px; display: block; margin-bottom: 4px; }
.cal-club-head .badge-name {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
}
.cal-corner { background: transparent !important; }

.cal-row {
  display: grid;
  grid-template-columns: 80px repeat(8, 1fr);
  gap: 6px;
  margin-bottom: 6px;
}
.cal-jday {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 8px;
  border-radius: 10px;
}
.cal-jday .jnum {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
}
.cal-jday .jdate {
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
  text-align: center;
  line-height: 1.3;
}

.cal-cell {
  border-radius: 10px;
  padding: 8px 6px;
  text-align: center;
  cursor: default;
  transition: all 0.2s;
  position: relative;
  min-height: 52px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.cal-cell.clickable {
  cursor: pointer;
}
.cal-cell.clickable:hover {
  background: var(--glass-b) !important;
  border-color: var(--border-h) !important;
  transform: translateY(-1px);
}

.cal-adv {
  font-size: 10px;
  font-weight: 500;
  color: var(--muted);
  line-height: 1.3;
}
.cal-ha {
  font-size: 9px;
  color: rgba(232,234,240,0.3);
  margin-top: 1px;
}
.cal-result {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 800;
  margin-top: 3px;
}

/* États colorés */
.cal-cell.win  { background: var(--win-bg);  border: 1px solid rgba(34,197,94,0.2);  }
.cal-cell.draw { background: var(--draw-bg); border: 1px solid rgba(245,158,11,0.2); }
.cal-cell.loss { background: var(--loss-bg); border: 1px solid rgba(239,68,68,0.2);  }
.cal-cell.win  .cal-result { color: var(--win);  }
.cal-cell.draw .cal-result { color: var(--draw); }
.cal-cell.loss .cal-result { color: var(--loss); }
.cal-cell.win  .cal-adv { color: rgba(34,197,94,0.8);  }
.cal-cell.draw .cal-adv { color: rgba(245,158,11,0.8); }
.cal-cell.loss .cal-adv { color: rgba(239,68,68,0.8);  }

.cal-cell.future { background: var(--glass); border: 1px solid var(--border); }
.cal-cell.mirror { background: var(--blue-bg); border: 1px solid rgba(59,130,246,0.2); }

/* Popup saisie pronostic */
.pick-popup {
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 4px;
  background: #1a1d27;
  border: 1px solid var(--border-h);
  border-radius: 10px;
  padding: 6px;
  z-index: 100;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  white-space: nowrap;
  animation: popIn 0.15s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn {
  from { opacity: 0; transform: translateX(-50%) scale(0.85); }
  to   { opacity: 1; transform: translateX(-50%) scale(1); }
}
.pick-btn {
  padding: 5px 10px;
  border-radius: 7px;
  border: none;
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.pick-btn:hover { transform: scale(1.08); }
.pick-btn.v { background: var(--win-bg);  color: var(--win);  border: 1px solid rgba(34,197,94,0.3); }
.pick-btn.n { background: var(--draw-bg); color: var(--draw); border: 1px solid rgba(245,158,11,0.3); }
.pick-btn.d { background: var(--loss-bg); color: var(--loss); border: 1px solid rgba(239,68,68,0.3); }
.pick-btn.clear { background: var(--glass); color: var(--muted); border: 1px solid var(--border); font-size: 11px; }

/* ═══════════════════════════════════════════════════
   GRAPHIQUE
═══════════════════════════════════════════════════ */
#chart-section { margin-bottom: 48px; }
.chart-wrap { padding: 24px; }

#pts-chart {
  width: 100%;
  height: 260px;
}

.chart-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 12px 20px;
  margin-top: 20px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--muted);
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════════════
   LOADER
═══════════════════════════════════════════════════ */
#loader {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  transition: opacity 0.5s, visibility 0.5s;
}
#loader.hidden { opacity: 0; visibility: hidden; }
.loader-logo {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 32px;
  background: linear-gradient(135deg, #fff, rgba(255,255,255,0.4));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.loader-bar {
  width: 200px;
  height: 2px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.loader-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #0ea5e9);
  border-radius: 2px;
  animation: load 1.8s ease-in-out forwards;
}
@keyframes load {
  from { width: 0%; }
  to   { width: 100%; }
}
.loader-text {
  margin-top: 16px;
  font-size: 12px;
  color: var(--muted);
  animation: blink 1.5s ease-in-out infinite;
}
@keyframes blink {
  0%,100% { opacity: 0.5; }
  50%      { opacity: 1; }
}

/* ═══════════════════════════════════════════════════
   SLIDE-IN ANIMATION
═══════════════════════════════════════════════════ */
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeIn 0.6s ease forwards;
}
@keyframes fadeIn {
  to { opacity: 1; transform: translateY(0); }
}
.fade-in:nth-child(1) { animation-delay: 0.1s; }
.fade-in:nth-child(2) { animation-delay: 0.2s; }
.fade-in:nth-child(3) { animation-delay: 0.3s; }

/* ═══════════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════════ */
@media (max-width: 768px) {
  .wrapper { padding: 0 16px 60px; }
  h1 { font-size: 1.8rem; }
  .rank-item { grid-template-columns: 36px 1fr auto; }
  .rank-proj { display: none; }
}
</style>
</head>
<body>

<!-- Loader -->
<div id="loader">
  <div class="loader-logo">Sprint Final 🏆</div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
  <div class="loader-text">Chargement des données Ligue 1…</div>
</div>

<!-- Background -->
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="wrapper">

  <!-- Header -->
  <header class="fade-in">
    <div class="header-badge">
      <div class="pulse"></div>
      Ligue 1 McDonald's · 2025/2026
    </div>
    <h1>Sprint Final</h1>
    <p class="header-sub">Top 8 · Candidats Europe · J24 → J34</p>
    <p class="last-update" id="last-update"></p>
  </header>

  <!-- Classement -->
  <section id="ranking-section" class="fade-in">
    <p class="section-title">📊 Classement projeté</p>
    <div id="ranking-list"></div>
  </section>

  <!-- Calendrier -->
  <section id="calendar-section" class="fade-in">
    <p class="section-title">🗓️ Calendrier & Pronostics</p>
    <p style="font-size:12px;color:var(--muted);margin-bottom:16px;">
      Résultats réels verrouillés automatiquement · Cliquez sur un match futur pour pronostiquer
    </p>
    <div class="calendar-scroll">
      <div class="calendar-grid" id="calendar-grid"></div>
    </div>
  </section>

  <!-- Graphique -->
  <section id="chart-section" class="fade-in">
    <p class="section-title">📈 Évolution des points</p>
    <div class="glass chart-wrap">
      <canvas id="pts-chart"></canvas>
      <div class="chart-legend" id="chart-legend"></div>
    </div>
  </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

    {adv:"Nantes",ha:"H",mirror:null},{adv:"Lorient",ha:"H",mirror:null},
    {adv:"Rennes",ha:"A",mirror:"Rennes"},{adv:"Marseille",ha:"A",mirror:"OM"},
    {adv:"Lens",ha:"H",mirror:"Lens"},{adv:"Toulouse",ha:"A",mirror:null},
    {adv:"Nice",ha:"A",mirror:null},{adv:"Paris FC",ha:"A",mirror:null},
    {adv:"Le Havre",ha:"H",mirror:null},{adv:"Monaco",ha:"A",mirror:"Monaco"},
    {adv:"Auxerre",ha:"H",mirror:null}
  ],
  Rennes:     [
    {adv:"Toulouse",ha:"H",mirror:null},{adv:"Nice",ha:"A",mirror:null},
    {adv:"Lille",ha:"H",mirror:"Lille"},{adv:"Metz",ha:"H",mirror:null},
    {adv:"Brest",ha:"A",mirror:null},{adv:"Angers",ha:"H",mirror:null},
    {adv:"Strasbourg",ha:"A",mirror:"Strasbourg"},{adv:"Nantes",ha:"H",mirror:null},
    {adv:"Lyon",ha:"A",mirror:"Lyon"},{adv:"Paris FC",ha:"H",mirror:null},
    {adv:"OM",ha:"A",mirror:"OM"}
  ],
  Strasbourg: [
    {adv:"Lens",ha:"H",mirror:"Lens"},{adv:"Auxerre",ha:"A",mirror:null},
    {adv:"Paris FC",ha:"H",mirror:null},{adv:"Nantes",ha:"A",mirror:null},
    {adv:"Nice",ha:"H",mirror:null},{adv:"Brest",ha:"H",mirror:null},
    {adv:"Rennes",ha:"H",mirror:"Rennes"},{adv:"Lorient",ha:"H",mirror:null},
    {adv:"Toulouse",ha:"A",mirror:null},{adv:"Angers",ha:"H",mirror:null},
    {adv:"Monaco",ha:"H",mirror:"Monaco"}
  ],
  Monaco:     [
    {adv:"Angers",ha:"H",mirror:null},{adv:"PSG",ha:"A",mirror:"PSG"},
    {adv:"Brest",ha:"H",mirror:null},{adv:"Lyon",ha:"A",mirror:"Lyon"},
    {adv:"Marseille",ha:"H",mirror:"OM"},{adv:"Paris FC",ha:"A",mirror:null},
    {adv:"Auxerre",ha:"H",mirror:null},{adv:"Toulouse",ha:"A",mirror:null},
    {adv:"Metz",ha:"A",mirror:null},{adv:"Lille",ha:"H",mirror:"Lille"},
    {adv:"Strasbourg",ha:"A",mirror:"Strasbourg"}
  ],
};

const JOURNEES = [
  {id:"J24",date:"1 Mars"},{id:"J25",date:"8 Mars"},{id:"J26",date:"15 Mars"},
  {id:"J27",date:"22 Mars"},{id:"J28",date:"5 Avr."},{id:"J29",date:"12 Avr."},
  {id:"J30",date:"19 Avr."},{id:"J31",date:"26 Avr."},{id:"J32",date:"3 Mai"},
  {id:"J33",date:"10 Mai"},{id:"J34",date:"17 Mai"},
];

// Duels internes — maître = club avec index plus petit
const DUELS = [
  ["OM","Lyon",0],["PSG","Monaco",1],["Rennes","Lille",2],
  ["OM","Lille",3],["Lyon","Monaco",3],["Lens","Lille",4],
  ["OM","Monaco",4],["PSG","Lens",5],["PSG","Lyon",6],
  ["Rennes","Strasbourg",6],["Lyon","Rennes",8],
  ["Lille","Monaco",9],["OM","Rennes",10],
  ["Lens","Lyon",10],["Strasbourg","Monaco",10],
];

function isMaster(club, jOffset) {
  for (const [a,b,j] of DUELS) {
    if (j !== jOffset) continue;
    if (club === a || club === b) {
      return CLUBS.indexOf(a) < CLUBS.indexOf(b) ? club === a : club === b;
    }
  }
  return true; // pas un duel interne
}

function getMirrorClub(club, jOffset) {
  return CALENDAR[club][jOffset].mirror;
}

// ═══════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════

// results[club][jOffset] = "V"|"N"|"D"|null
// locked[club][jOffset] = true si résultat réel verrouillé
const results = {};
const locked  = {};
CLUBS.forEach(c => {
  results[c] = new Array(11).fill(null);
  locked[c]  = new Array(11).fill(false);
});

// Charger pronostics depuis localStorage
function loadPronostics() {
  try {
    const saved = localStorage.getItem("sprintfinal_pronostics");
    if (saved) {
      const data = JSON.parse(saved);
      CLUBS.forEach(c => {
        if (data[c]) {
          data[c].forEach((v, i) => {
            if (v && !locked[c][i]) results[c][i] = v;
          });
        }
      });
    }
  } catch(e) {}
}

function savePronostics() {
  const data = {};
  CLUBS.forEach(c => {
    data[c] = results[c].map((v,i) => locked[c][i] ? null : v);
  });
  localStorage.setItem("sprintfinal_pronostics", JSON.stringify(data));
}

// ═══════════════════════════════════════════════════════════════════════
// API FOOTBALL-DATA
// ═══════════════════════════════════════════════════════════════════════

const API_NAME_MAP = {
  "Paris Saint-Germain FC":"PSG","Paris Saint-Germain":"PSG","Paris SG":"PSG",
  "RC Lens":"Lens","Racing Club De Lens":"Lens","Racing Club de Lens":"Lens",
  "Olympique Lyonnais":"Lyon","Olympique de Lyon":"Lyon",
  "Olympique de Marseille":"OM","Olympique Marseille":"OM","Marseille":"OM",
  "LOSC Lille":"Lille","Lille OSC":"Lille",
  "Stade Rennais FC":"Rennes","Stade Rennais":"Rennes",
  "RC Strasbourg Alsace":"Strasbourg","RC Strasbourg":"Strasbourg",
  "AS Monaco FC":"Monaco","AS Monaco":"Monaco",
};

function mapTeam(name) {
  if (API_NAME_MAP[name]) return API_NAME_MAP[name];
  for (const [k,v] of Object.entries(API_NAME_MAP)) {
    if (k.toLowerCase() === name.toLowerCase()) return v;
    if (k.toLowerCase().includes(name.toLowerCase()) || name.toLowerCase().includes(k.toLowerCase())) return v;
  }
  return null;
}

async function fetchResults() {
  try {
    const resp = await fetch("/.netlify/functions/results");
    if (!resp.ok) throw new Error("API error");
    const data = await resp.json();
    const matches = data.matches || [];

    matches.forEach(m => {
      const jday = m.matchday;
      if (!jday || jday < 24 || m.status !== "FINISHED") return;
      const jOff = jday - 24;
      if (jOff > 10) return;

      const home = mapTeam(m.homeTeam.name);
      const away = mapTeam(m.awayTeam.name);
      const sh = m.score?.fullTime?.home;
      const sa = m.score?.fullTime?.away;
      if (sh === null || sa === null) return;

      if (home) {
        results[home][jOff] = sh > sa ? "V" : sh < sa ? "D" : "N";
        locked[home][jOff] = true;
      }
      if (away) {
        results[away][jOff] = sa > sh ? "V" : sa < sh ? "D" : "N";
        locked[away][jOff] = true;
      }
    });

    // Propager les miroirs pour les résultats réels
    DUELS.forEach(([a,b,j]) => {
      const master = CLUBS.indexOf(a) < CLUBS.indexOf(b) ? a : b;
      const slave  = master === a ? b : a;
      if (results[master][j] && locked[master][j]) {
        const inv = results[master][j] === "V" ? "D" : results[master][j] === "D" ? "V" : "N";
        results[slave][j] = inv;
        locked[slave][j]  = true;
      }
    });

    return true;
  } catch(e) {
    console.warn("API non disponible, affichage hors ligne", e);
    return false;
  }
}

// ═══════════════════════════════════════════════════════════════════════
// CALCUL POINTS
// ═══════════════════════════════════════════════════════════════════════

function calcPts(club) {
  let pts = PTS_J23[club];
  results[club].forEach(r => {
    if (r === "V") pts += 3;
    else if (r === "N") pts += 1;
  });
  return pts;
}

function getMaxPts(club) {
  let pts = PTS_J23[club];
  results[club].forEach((r, i) => {
    if (r === "V") pts += 3;
    else if (r === "N") pts += 1;
    else if (r === null) pts += 3; // tous les matchs restants en victoire
  });
  return pts;
}

function getSortedRanking() {
  return [...CLUBS].sort((a,b) => {
    const diff = calcPts(b) - calcPts(a);
    if (diff !== 0) return diff;
    // Tie-break : points J23 (ordre initial)
    return PTS_J23[b] - PTS_J23[a];
  });
}

// ═══════════════════════════════════════════════════════════════════════
// RENDU CLASSEMENT
// ═══════════════════════════════════════════════════════════════════════

let prevRanking = [];
let prevPts = {};

const ZONES = {
  1:"zone-cl", 2:"zone-cl", 3:"zone-cl",
  4:"zone-cl4", 5:"zone-el", 6:"zone-conf",
};

function renderRanking(animate=false) {
  const list = document.getElementById("ranking-list");
  const ranking = getSortedRanking();

  ranking.forEach((club, i) => {
    const rank = i + 1;
    const pts  = calcPts(club);
    const maxP = getMaxPts(club);
    const zone = ZONES[rank] || "zone-out";
    const meta = CLUB_META[club];

    const prevPt = prevPts[club];
    const ptsDiff = (prevPt !== undefined && animate) ? pts - prevPt : 0;

    let el = document.getElementById("rank-" + club);
    if (!el) {
      el = document.createElement("div");
      el.id = "rank-" + club;
      el.className = "rank-item glass " + zone;
      el.innerHTML = `
        <div class="rank-num ${rank===1?'gold':rank===2?'silver':rank===3?'bronze':''}" id="rnum-${club}">${rank}</div>
        <div class="rank-club">
          <div class="club-badge" style="background:${meta.color}22;border:1px solid ${meta.color}44">${meta.emoji}</div>
          <div>
            <div class="rank-name">${meta.name}</div>
            <div class="rank-zone">${getZoneLabel(rank)}</div>
          </div>
        </div>
        <div class="rank-pts-col">
          <div class="rank-pts" id="rpts-${club}">${pts}</div>
          <div class="rank-delta" id="rdelta-${club}">J23: ${PTS_J23[club]} pts</div>
        </div>
        <div class="rank-proj">
          <div class="proj-label">max</div>
          <div class="proj-val" id="rmax-${club}">${maxP}</div>
        </div>
      `;
      list.appendChild(el);
    } else {
      // Mise à jour des valeurs
      document.getElementById("rnum-"+club).textContent = rank;
      document.getElementById("rnum-"+club).className = "rank-num " + (rank===1?'gold':rank===2?'silver':rank===3?'bronze':'');
      document.getElementById("rmax-"+club).textContent = maxP;
      el.className = "rank-item glass " + zone;

      const ptsEl = document.getElementById("rpts-"+club);
      ptsEl.textContent = pts;

      // Animation +pts
      if (ptsDiff > 0) {
        ptsEl.classList.remove("pts-bump");
        void ptsEl.offsetWidth;
        ptsEl.classList.add("pts-bump");

        const badge = document.createElement("span");
        badge.className = "pts-badge";
        badge.textContent = "+" + ptsDiff;
        ptsEl.appendChild(badge);
        setTimeout(() => badge.remove(), 1900);
      }
    }

    // Animation de glissement si changement de position
    const prevIdx = prevRanking.indexOf(club);
    if (prevIdx !== -1 && prevIdx !== i && animate) {
      el.style.transition = "none";
      el.style.transform = "translateY(" + ((prevIdx - i) * 62) + "px)";
      el.style.zIndex = "10";
      requestAnimationFrame(() => {
        el.style.transition = "transform 0.7s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s";
        el.style.transform = "translateY(0)";
        el.style.boxShadow = "0 0 0 2px rgba(255,255,255,0.1)";
        setTimeout(() => {
          el.style.zIndex = "";
          el.style.boxShadow = "";
        }, 700);
      });
    }
  });

  // Réordonner le DOM
  const sorted = ranking.map(c => document.getElementById("rank-"+c)).filter(Boolean);
  sorted.forEach(el => list.appendChild(el));

  prevRanking = ranking;
  prevPts = {};
  CLUBS.forEach(c => prevPts[c] = calcPts(c));
}

function getZoneLabel(rank) {
  if (rank <= 3) return "Ligue des Champions";
  if (rank === 4) return "CL Qualifications";
  if (rank === 5) return "Europa League";
  if (rank === 6) return "Conférence Playoffs";
  return "";
}

// ═══════════════════════════════════════════════════════════════════════
// RENDU CALENDRIER
// ═══════════════════════════════════════════════════════════════════════

let openPopup = null;

function closePopup() {
  if (openPopup) {
    openPopup.remove();
    openPopup = null;
  }
}

document.addEventListener("click", (e) => {
  if (!e.target.closest(".cal-cell") && !e.target.closest(".pick-popup")) {
    closePopup();
  }
});

function resultClass(r) {
  if (r === "V") return "win";
  if (r === "N") return "draw";
  if (r === "D") return "loss";
  return "";
}
function resultLabel(r) {
  if (r === "V") return "V";
  if (r === "N") return "N";
  if (r === "D") return "D";
  return "";
}

function setResult(club, jOff, val, animate=true) {
  if (locked[club][jOff]) return;

  const prevP = {};
  CLUBS.forEach(c => prevP[c] = calcPts(c));

  results[club][jOff] = val;

  // Propager aux cellules miroir
  const mirrorClub = getMirrorClub(club, jOff);
  if (mirrorClub && !locked[mirrorClub][jOff]) {
    const inv = val === "V" ? "D" : val === "D" ? "V" : val === "N" ? "N" : null;
    results[mirrorClub][jOff] = inv;
    updateCell(mirrorClub, jOff);
  }

  updateCell(club, jOff);
  savePronostics();

  // Recalcul pts pour animation
  if (animate) {
    prevPts = prevP;
    renderRanking(true);
    updateChart();
  }
}

function updateCell(club, jOff) {
  const cellId = "cell-"+club+"-"+jOff;
  const el = document.getElementById(cellId);
  if (!el) return;

  const r = results[club][jOff];
  const isLocked = locked[club][jOff];
  const isMirrorCell = !isMaster(club, jOff);
  const cal = CALENDAR[club][jOff];

  el.className = "cal-cell glass " + resultClass(r) +
    (isLocked ? "" : isMirrorCell ? " mirror" : " future") +
    (!isLocked ? " clickable" : "");

  const advEl = el.querySelector(".cal-adv");
  const resEl = el.querySelector(".cal-result");
  if (advEl) advEl.textContent = cal.adv;
  if (resEl) resEl.textContent = resultLabel(r);
}

function renderCalendar() {
  const grid = document.getElementById("calendar-grid");
  grid.innerHTML = "";

  // Header
  const header = document.createElement("div");
  header.className = "cal-header";
  header.innerHTML = `<div class="cal-corner glass cal-jday"></div>`;
  CLUBS.forEach(club => {
    const meta = CLUB_META[club];
    header.innerHTML += `
      <div class="cal-club-head glass" style="border-left:3px solid ${meta.color}44">
        <span class="badge-emoji">${meta.emoji}</span>
        <span class="badge-name">${club}</span>
      </div>`;
  });
  grid.appendChild(header);

  // Lignes journées
  JOURNEES.forEach((j, jOff) => {
    const row = document.createElement("div");
    row.className = "cal-row";

    row.innerHTML = `
      <div class="cal-jday glass">
        <span class="jnum">${j.id}</span>
        <span class="jdate">${j.date}</span>
      </div>`;

    CLUBS.forEach(club => {
      const cal = CALENDAR[club][jOff];
      const r   = results[club][jOff];
      const isLocked = locked[club][jOff];
      const isMir = !isMaster(club, jOff);

      const cell = document.createElement("div");
      cell.id = "cell-"+club+"-"+jOff;
      cell.className = "cal-cell glass " + resultClass(r) +
        (isLocked ? "" : isMir ? " mirror" : " future") +
        (!isLocked ? " clickable" : "");

      cell.innerHTML = `
        <span class="cal-adv">${cal.adv}</span>
        <span class="cal-ha">${cal.ha === "H" ? "Dom." : "Ext."}</span>
        <span class="cal-result">${resultLabel(r)}</span>
      `;

      if (!isLocked) {
        cell.addEventListener("click", (e) => {
          e.stopPropagation();
          closePopup();

          const popup = document.createElement("div");
          popup.className = "pick-popup";
          popup.innerHTML = `
            <button class="pick-btn v">V</button>
            <button class="pick-btn n">N</button>
            <button class="pick-btn d">D</button>
            <button class="pick-btn clear">✕</button>
          `;
          popup.querySelector(".v").onclick = (ev) => { ev.stopPropagation(); setResult(club,jOff,"V"); closePopup(); };
          popup.querySelector(".n").onclick = (ev) => { ev.stopPropagation(); setResult(club,jOff,"N"); closePopup(); };
          popup.querySelector(".d").onclick = (ev) => { ev.stopPropagation(); setResult(club,jOff,"D"); closePopup(); };
          popup.querySelector(".clear").onclick = (ev) => { ev.stopPropagation(); setResult(club,jOff,null); closePopup(); };

          cell.appendChild(popup);
          openPopup = popup;
        });
      }

      row.appendChild(cell);
    });

    grid.appendChild(row);
  });
}

// ═══════════════════════════════════════════════════════════════════════
// GRAPHIQUE ÉVOLUTION
// ═══════════════════════════════════════════════════════════════════════

let chartInstance = null;

function buildChartData() {
  // Pour chaque journée J24..J34, calculer les pts cumulés
  // en partant des pts J23 et en ajoutant les résultats journée par journée
  const labels = ["J23", ...JOURNEES.map(j => j.id)];

  const datasets = CLUBS.map(club => {
    const pts = [PTS_J23[club]];
    let cumul = PTS_J23[club];
    for (let i = 0; i < 11; i++) {
      const r = results[club][i];
      if (r === "V") cumul += 3;
      else if (r === "N") cumul += 1;
      // On ajoute le point même si null (on garde le dernier cumul)
      pts.push(cumul);
    }
    return {
      label: club,
      data: pts,
      borderColor: CHART_COLORS[club],
      backgroundColor: CHART_COLORS[club] + "22",
      borderWidth: 2,
      pointRadius: 3,
      pointHoverRadius: 6,
      tension: 0.4,
      fill: false,
    };
  });

  return { labels, datasets };
}

function updateChart() {
  if (!chartInstance) return;
  const { labels, datasets } = buildChartData();
  chartInstance.data.labels  = labels;
  chartInstance.data.datasets = datasets;
  chartInstance.update("active");
}

function initChart() {
  const ctx = document.getElementById("pts-chart").getContext("2d");
  const { labels, datasets } = buildChartData();

  chartInstance = new Chart(ctx, {
    type: "line",
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#1a1d27",
          borderColor: "rgba(255,255,255,0.1)",
          borderWidth: 1,
          titleColor: "#fff",
          bodyColor: "rgba(232,234,240,0.7)",
          padding: 12,
          callbacks: {
            label: ctx => ` ${ctx.dataset.label} : ${ctx.raw} pts`
          }
        }
      },
      scales: {
        x: {
          grid: { color: "rgba(255,255,255,0.04)" },
          ticks: { color: "rgba(232,234,240,0.4)", font: { size: 11 } },
        },
        y: {
          grid: { color: "rgba(255,255,255,0.04)" },
          ticks: { color: "rgba(232,234,240,0.4)", font: { size: 11 } },
        }
      }
    }
  });

  // Légende custom
  const legend = document.getElementById("chart-legend");
  CLUBS.forEach(club => {
    legend.innerHTML += `
      <div class="legend-item">
        <div class="legend-dot" style="background:${CHART_COLORS[club]}"></div>
        ${CLUB_META[club].name}
      </div>`;
  });
}

// ═══════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════

async function init() {
  // 1. Charger pronostics sauvegardés
  loadPronostics();

  // 2. Sauvegarder les pts avant API pour détecter changements
  CLUBS.forEach(c => prevPts[c] = calcPts(c));

  // 3. Appeler l'API
  const apiOk = await fetchResults();

  // 4. Re-charger pronostics (les vrais résultats ne les écrasent pas)
  loadPronostics();

  // 5. Render
  renderCalendar();
  renderRanking(false);
  initChart();

  // Mise à jour
  const now = new Date();
  document.getElementById("last-update").textContent =
    "Mis à jour le " + now.toLocaleDateString("fr-FR") + " à " + now.toLocaleTimeString("fr-FR", {hour:"2-digit",minute:"2-digit"}) +
    (apiOk ? " · Données API en direct" : " · Mode hors ligne");

  // 6. Masquer le loader
  setTimeout(() => {
    document.getElementById("loader").classList.add("hidden");
  }, 1800);
}

init();
