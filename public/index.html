<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprint Final · L1 2025/2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0b0e14;
  --bg2:    #111520;
  --bg3:    #181d28;
  --border: rgba(255,255,255,0.07);
  --text:   #dde1ec;
  --muted:  rgba(221,225,236,0.4);
  --win:    #22c55e;
  --draw:   #f59e0b;
  --loss:   #ef4444;
  --blue:   #3b82f6;
  --r:      7px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
}

/* ── LAYOUT ─────────────────────────────────────── */
#app {
  display: grid;
  grid-template-rows: 42px 1fr;
  grid-template-columns: 1fr 200px;
  grid-template-areas: "header header" "cal rank";
  height: 100vh;
}

/* ── HEADER ─────────────────────────────────────── */
#header {
  grid-area: header;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.header-title {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: -0.02em;
}
.header-title span { color: var(--muted); font-weight: 600; }
#status { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--win); animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── CALENDRIER ─────────────────────────────────── */
#cal {
  grid-area: cal;
  overflow: auto;
  padding: 8px;
  background: var(--bg);
}
#cal::-webkit-scrollbar { width: 3px; height: 3px; }
#cal::-webkit-scrollbar-track { background: transparent; }
#cal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.cal-grid {
  display: grid;
  grid-template-columns: 52px repeat(8, minmax(74px, 1fr));
  gap: 2px;
  min-width: 680px;
}

/* Header club */
.ch {
  padding: 5px 3px;
  text-align: center;
  border-radius: var(--r);
  background: var(--bg2);
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.ch img { width: 24px; height: 24px; object-fit: contain; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5)); }
.ch-name { font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700; color: var(--muted); }
.ch-pts { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 800; }
.corner { background: transparent !important; border: none !important; }

/* Journée label */
.jlabel {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 3px 2px;
  border-radius: var(--r);
  background: var(--bg2);
  border: 1px solid var(--border);
}
.jlabel .jn { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; }
.jlabel .jd { font-size: 8px; color: var(--muted); text-align: center; line-height: 1.2; }

/* ── CELLULE MATCH ──────────────────────────────── */
/* Architecture : blason centré + nom petit en dessous + émoji H/A en haut à droite + résultat en bas */
.cell {
  border-radius: var(--r);
  border: 1px solid var(--border);
  background: var(--bg2);
  min-height: 56px;
  display: grid;
  grid-template-areas:
    "ha"
    "badge"
    "name"
    "res";
  grid-template-rows: 14px 26px 12px 12px;
  align-items: center;
  justify-items: center;
  padding: 2px 3px;
  transition: background 0.15s, border-color 0.15s;
  position: relative;
  overflow: visible;
}
.cell.clickable { cursor: pointer; }
.cell.clickable:hover { border-color: rgba(255,255,255,0.18); background: var(--bg3); }

.c-ha {
  grid-area: ha;
  font-size: 13px;
  line-height: 1;
  align-self: center;
}
.cell img.adv-badge {
  grid-area: badge;
  width: 26px; height: 26px;
  object-fit: contain;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6));
}
.c-adv {
  grid-area: name;
  font-size: 8.5px;
  color: var(--muted);
  text-align: center;
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}
.c-res {
  grid-area: res;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 800;
  line-height: 1;
}

/* Couleurs résultats */
.win  { background: rgba(34,197,94,0.12)  !important; border-color: rgba(34,197,94,0.3)   !important; }
.draw { background: rgba(245,158,11,0.12) !important; border-color: rgba(245,158,11,0.3)  !important; }
.loss { background: rgba(239,68,68,0.12)  !important; border-color: rgba(239,68,68,0.3)   !important; }
.win  .c-res { color: var(--win); }
.draw .c-res { color: var(--draw); }
.loss .c-res { color: var(--loss); }
.win  .c-adv,.win  .c-ha { opacity: 0.65; }
.draw .c-adv,.draw .c-ha { opacity: 0.65; }
.loss .c-adv,.loss .c-ha { opacity: 0.65; }
.mirror { border-color: rgba(59,130,246,0.3) !important; }

/* Popup */
.popup {
  position: absolute;
  bottom: calc(100% + 4px);
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 3px;
  background: #1c2030;
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: var(--r);
  padding: 5px;
  z-index: 200;
  box-shadow: 0 6px 24px rgba(0,0,0,0.6);
  animation: pop 0.12s ease;
  white-space: nowrap;
}
@keyframes pop {
  from { opacity:0; transform:translateX(-50%) scale(0.88); }
  to   { opacity:1; transform:translateX(-50%) scale(1); }
}
.pb {
  padding: 5px 10px;
  border-radius: 6px;
  border: none;
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 800;
  cursor: pointer;
  transition: opacity 0.1s;
}
.pb:hover { opacity: 0.82; }
.pb.v { background: rgba(34,197,94,0.15);   color: var(--win);  border: 1px solid rgba(34,197,94,0.3); }
.pb.n { background: rgba(245,158,11,0.15);  color: var(--draw); border: 1px solid rgba(245,158,11,0.3); }
.pb.d { background: rgba(239,68,68,0.15);   color: var(--loss); border: 1px solid rgba(239,68,68,0.3); }
.pb.x { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); font-size:11px; }

/* ── CLASSEMENT ─────────────────────────────────── */
#rank {
  grid-area: rank;
  overflow: hidden;
  border-left: 1px solid var(--border);
  background: var(--bg);
  display: flex;
  flex-direction: column;
  padding: 8px 7px;
  gap: 2px;
}
.rank-title {
  font-family: 'Syne', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
  padding-left: 2px;
}

.ri {
  display: grid;
  grid-template-columns: 18px 24px 1fr auto;
  align-items: center;
  gap: 6px;
  padding: 5px 7px;
  border-radius: var(--r);
  border: 1px solid transparent;
  border-left: 2px solid transparent;
  transition: transform 0.55s cubic-bezier(0.34,1.56,0.64,1);
  will-change: transform;
  position: relative;
}
.ri:hover { background: var(--bg2); }
.ri.z-cl   { border-left-color: #3b82f6; }
.ri.z-cl4  { border-left-color: #0ea5e9; }
.ri.z-el   { border-left-color: #f59e0b; }
.ri.z-conf { border-left-color: #8b5cf6; }

.ri-num { font-family:'Syne',sans-serif; font-size:12px; font-weight:800; text-align:center; color:var(--muted); }
.ri-num.g { color:#fbbf24; }
.ri-num.s { color:#94a3b8; }
.ri-num.b { color:#cd7f32; }

.ri img { width:20px; height:20px; object-fit:contain; filter:drop-shadow(0 1px 2px rgba(0,0,0,0.5)); }

.ri-name { font-family:'Syne',sans-serif; font-size:10px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.ri-pts { font-family:'Syne',sans-serif; font-size:15px; font-weight:800; text-align:right; position:relative; display:inline-block; }

.bump { animation: bump 1s cubic-bezier(0.34,1.56,0.64,1) forwards; }
@keyframes bump {
  0%   { transform:scale(1);    color:var(--text); }
  35%  { transform:scale(1.35); color:var(--win); }
  100% { transform:scale(1);    color:var(--text); }
}
.badge {
  position:absolute; top:-12px; right:0;
  font-size:9px; font-weight:700;
  color:var(--win);
  background:rgba(34,197,94,0.15);
  border:1px solid rgba(34,197,94,0.25);
  border-radius:100px; padding:1px 5px;
  white-space:nowrap;
  animation:badgePop 1.6s ease forwards;
  pointer-events:none;
}
@keyframes badgePop {
  0%  { opacity:0; transform:translateY(4px); }
  20% { opacity:1; transform:translateY(0); }
  70% { opacity:1; }
  100%{ opacity:0; transform:translateY(-6px); }
}

/* ── GRAPHIQUE ──────────────────────────────────── */
#chart-wrap {
  min-width: 680px;
  margin-top: 6px;
  padding: 8px 10px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r);
}
#chart-title { font-family:'Syne',sans-serif; font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
#pts-chart { width:100% !important; height:120px !important; }
.chart-legend { display:flex; flex-wrap:wrap; gap:4px 12px; margin-top:6px; }
.leg { display:flex; align-items:center; gap:4px; font-size:9px; color:var(--muted); }
.leg img { width:12px; height:12px; object-fit:contain; }

/* ── LOADER ─────────────────────────────────────── */
#loader {
  position:fixed; inset:0; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:999; transition:opacity .4s,visibility .4s;
}
#loader.gone { opacity:0; visibility:hidden; }
.l-title { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; margin-bottom:24px; }
.l-bar { width:160px; height:2px; background:var(--border); border-radius:2px; overflow:hidden; }
.l-fill { height:100%; background:linear-gradient(90deg,var(--blue),var(--win)); border-radius:2px; animation:lfill 1.4s ease forwards; }
@keyframes lfill { from{width:0} to{width:100%} }
.l-txt { margin-top:12px; font-size:11px; color:var(--muted); }
</style>
</head>
<body>

<div id="loader">
  <div class="l-title">Sprint Final 🏆</div>
  <div class="l-bar"><div class="l-fill"></div></div>
  <div class="l-txt">Chargement des données…</div>
</div>

<div id="app">
  <div id="header">
    <div class="header-title">Sprint Final <span>· Ligue 1 2025/2026 · J24→J34</span></div>
    <div id="status"><div class="dot"></div><span id="status-txt">Connexion…</span></div>
  </div>
  <div id="cal">
    <div class="cal-grid" id="cal-grid"></div>
    <div id="chart-wrap">
      <div id="chart-title">Évolution des points</div>
      <canvas id="pts-chart"></canvas>
      <div class="chart-legend" id="chart-legend"></div>
    </div>
  </div>
  <div id="rank">
    <div class="rank-title">Classement projeté</div>
    <div id="rank-list"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
// ═══════════════════════════════════════════════
// BLASONS — deux sources selon disponibilité
// ═══════════════════════════════════════════════

const CREST = {
  // Top 8 + Nantes + Nice : football-data.org (fiables)
  PSG:        "https://crests.football-data.org/524.png",
  Lens:       "https://crests.football-data.org/546.png",
  Lyon:       "https://crests.football-data.org/523.png",
  OM:         "https://crests.football-data.org/516.png",
  Lille:      "https://crests.football-data.org/521.png",
  Rennes:     "https://crests.football-data.org/529.png",
  Strasbourg: "https://crests.football-data.org/576.png",
  Monaco:     "https://crests.football-data.org/548.png",
  Nantes:     "https://crests.football-data.org/543.png",
  Nice:       "https://crests.football-data.org/522.png",
  // Autres : Wikipedia Commons (SVG→PNG via thumb)
  "Le Havre":  "https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/HAC_logo.svg/120px-HAC_logo.svg.png",
  Toulouse:    "https://upload.wikimedia.org/wikipedia/commons/thumb/2/26/Logo_TFC.svg/120px-Logo_TFC.svg.png",
  Metz:        "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Logo_FC_Metz.svg/120px-Logo_FC_Metz.svg.png",
  Lorient:     "https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Logo_FC_Lorient.svg/120px-Logo_FC_Lorient.svg.png",
  Auxerre:     "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/AJ_Auxerre_logo.svg/120px-AJ_Auxerre_logo.svg.png",
  "Paris FC":  "https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Logo_Paris_FC.svg/120px-Logo_Paris_FC.svg.png",
  Brest:       "https://upload.wikimedia.org/wikipedia/commons/thumb/7/76/Stade_brestois_29_logo.svg/120px-Stade_brestois_29_logo.svg.png",
  Angers:      "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f9/Logo_SCO_Angers.svg/120px-Logo_SCO_Angers.svg.png",
  Marseille:   "https://crests.football-data.org/516.png",
};

function crestUrl(name) { return CREST[name] || ""; }

function crestImg(name, size) {
  const url = crestUrl(name);
  if (!url) return "";
  return '<img src="'+url+'" width="'+size+'" height="'+size+'" alt="'+name+'" onerror="this.style.display=\'none\'">';
}

// ═══════════════════════════════════════════════
// DONNÉES
// ═══════════════════════════════════════════════

const CLUBS = ["PSG","Lens","Lyon","OM","Lille","Rennes","Strasbourg","Monaco"];

const META = {
  PSG:{color:"#3b82f6",name:"Paris SG"},
  Lens:{color:"#ef4444",name:"RC Lens"},
  Lyon:{color:"#6366f1",name:"OL Lyon"},
  OM:{color:"#0ea5e9",name:"Marseille"},
  Lille:{color:"#8b5cf6",name:"LOSC"},
  Rennes:{color:"#f59e0b",name:"Rennes"},
  Strasbourg:{color:"#14b8a6",name:"Strasbourg"},
  Monaco:{color:"#f43f5e",name:"Monaco"},
};

const PTS0 = {PSG:54,Lens:52,Lyon:45,OM:40,Lille:37,Rennes:37,Strasbourg:34,Monaco:34};

const CAL = {
  PSG:       [{a:"Le Havre",h:"A",m:null},{a:"Monaco",h:"H",m:"Monaco"},{a:"Nantes",h:"H",m:null},{a:"Nice",h:"A",m:null},{a:"Toulouse",h:"H",m:null},{a:"Lens",h:"A",m:"Lens"},{a:"Lyon",h:"H",m:"Lyon"},{a:"Metz",h:"A",m:null},{a:"Lorient",h:"H",m:null},{a:"Auxerre",h:"H",m:null},{a:"Paris FC",h:"A",m:null}],
  Lens:      [{a:"Strasbourg",h:"A",m:"Strasbourg"},{a:"Metz",h:"H",m:null},{a:"Lorient",h:"A",m:null},{a:"Angers",h:"H",m:null},{a:"Lille",h:"A",m:"Lille"},{a:"PSG",h:"H",m:"PSG"},{a:"Toulouse",h:"H",m:null},{a:"Brest",h:"A",m:null},{a:"Nice",h:"A",m:null},{a:"Nantes",h:"H",m:null},{a:"Lyon",h:"A",m:"Lyon"}],
  Lyon:      [{a:"Marseille",h:"A",m:"OM"},{a:"Paris FC",h:"H",m:null},{a:"Le Havre",h:"A",m:null},{a:"Monaco",h:"H",m:"Monaco"},{a:"Angers",h:"A",m:null},{a:"Lorient",h:"H",m:null},{a:"PSG",h:"A",m:"PSG"},{a:"Auxerre",h:"H",m:null},{a:"Rennes",h:"H",m:"Rennes"},{a:"Toulouse",h:"A",m:null},{a:"Lens",h:"H",m:"Lens"}],
  OM:        [{a:"Lyon",h:"H",m:"Lyon"},{a:"Toulouse",h:"A",m:null},{a:"Auxerre",h:"H",m:null},{a:"Lille",h:"H",m:"Lille"},{a:"Monaco",h:"A",m:"Monaco"},{a:"Metz",h:"H",m:null},{a:"Lorient",h:"A",m:null},{a:"Nice",h:"H",m:null},{a:"Nantes",h:"A",m:null},{a:"Le Havre",h:"A",m:null},{a:"Rennes",h:"H",m:"Rennes"}],
  Lille:     [{a:"Nantes",h:"H",m:null},{a:"Lorient",h:"H",m:null},{a:"Rennes",h:"A",m:"Rennes"},{a:"Marseille",h:"A",m:"OM"},{a:"Lens",h:"H",m:"Lens"},{a:"Toulouse",h:"A",m:null},{a:"Nice",h:"A",m:null},{a:"Paris FC",h:"A",m:null},{a:"Le Havre",h:"H",m:null},{a:"Monaco",h:"A",m:"Monaco"},{a:"Auxerre",h:"H",m:null}],
  Rennes:    [{a:"Toulouse",h:"H",m:null},{a:"Nice",h:"A",m:null},{a:"Lille",h:"H",m:"Lille"},{a:"Metz",h:"H",m:null},{a:"Brest",h:"A",m:null},{a:"Angers",h:"H",m:null},{a:"Strasbourg",h:"A",m:"Strasbourg"},{a:"Nantes",h:"H",m:null},{a:"Lyon",h:"A",m:"Lyon"},{a:"Paris FC",h:"H",m:null},{a:"OM",h:"A",m:"OM"}],
  Strasbourg:[{a:"Lens",h:"H",m:"Lens"},{a:"Auxerre",h:"A",m:null},{a:"Paris FC",h:"H",m:null},{a:"Nantes",h:"A",m:null},{a:"Nice",h:"H",m:null},{a:"Brest",h:"H",m:null},{a:"Rennes",h:"H",m:"Rennes"},{a:"Lorient",h:"H",m:null},{a:"Toulouse",h:"A",m:null},{a:"Angers",h:"H",m:null},{a:"Monaco",h:"H",m:"Monaco"}],
  Monaco:    [{a:"Angers",h:"H",m:null},{a:"PSG",h:"A",m:"PSG"},{a:"Brest",h:"H",m:null},{a:"Lyon",h:"A",m:"Lyon"},{a:"Marseille",h:"H",m:"OM"},{a:"Paris FC",h:"A",m:null},{a:"Auxerre",h:"H",m:null},{a:"Toulouse",h:"A",m:null},{a:"Metz",h:"A",m:null},{a:"Lille",h:"H",m:"Lille"},{a:"Strasbourg",h:"A",m:"Strasbourg"}],
};

const JJ = [
  {id:"J24",d:"1 Mars"},{id:"J25",d:"8 Mars"},{id:"J26",d:"15 Mars"},
  {id:"J27",d:"22 Mars"},{id:"J28",d:"5 Avr."},{id:"J29",d:"12 Avr."},
  {id:"J30",d:"19 Avr."},{id:"J31",d:"26 Avr."},{id:"J32",d:"3 Mai"},
  {id:"J33",d:"10 Mai"},{id:"J34",d:"17 Mai"},
];

const DUELS = [
  ["OM","Lyon",0],["PSG","Monaco",1],["Rennes","Lille",2],
  ["OM","Lille",3],["Lyon","Monaco",3],["Lens","Lille",4],
  ["OM","Monaco",4],["PSG","Lens",5],["PSG","Lyon",6],
  ["Rennes","Strasbourg",6],["Lyon","Rennes",8],
  ["Lille","Monaco",9],["OM","Rennes",10],
  ["Lens","Lyon",10],["Strasbourg","Monaco",10],
];

const API_MAP = {
  "Paris Saint-Germain FC":"PSG","Paris Saint-Germain":"PSG","Paris SG":"PSG",
  "RC Lens":"Lens","Racing Club De Lens":"Lens","Racing Club de Lens":"Lens",
  "Olympique Lyonnais":"Lyon","Olympique de Lyon":"Lyon",
  "Olympique de Marseille":"OM","Olympique Marseille":"OM","Marseille":"OM",
  "LOSC Lille":"Lille","Lille OSC":"Lille",
  "Stade Rennais FC":"Rennes","Stade Rennais":"Rennes",
  "RC Strasbourg Alsace":"Strasbourg","RC Strasbourg":"Strasbourg",
  "AS Monaco FC":"Monaco","AS Monaco":"Monaco",
};

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════

const R={},L={};
CLUBS.forEach(c=>{R[c]=new Array(11).fill(null);L[c]=new Array(11).fill(false);});

function isMaster(club,j){
  for(const[a,b,jj]of DUELS){
    if(jj!==j)continue;
    if(club===a||club===b)return CLUBS.indexOf(a)<CLUBS.indexOf(b)?club===a:club===b;
  }
  return true;
}
function calcPts(c){let p=PTS0[c];R[c].forEach(r=>{if(r==="V")p+=3;else if(r==="N")p+=1;});return p;}
function sorted(){return [...CLUBS].sort((a,b)=>{const d=calcPts(b)-calcPts(a);return d!==0?d:PTS0[b]-PTS0[a];});}

function loadStorage(){
  try{const s=localStorage.getItem("sf_prono");if(!s)return;const d=JSON.parse(s);CLUBS.forEach(c=>{if(d[c])d[c].forEach((v,i)=>{if(v&&!L[c][i])R[c][i]=v;});});}catch(e){}
}
function saveStorage(){
  const d={};CLUBS.forEach(c=>{d[c]=R[c].map((v,i)=>L[c][i]?null:v);});
  localStorage.setItem("sf_prono",JSON.stringify(d));
}

// ═══════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════

function mapTeam(n){
  if(API_MAP[n])return API_MAP[n];
  for(const[k,v]of Object.entries(API_MAP))
    if(k.toLowerCase().includes(n.toLowerCase())||n.toLowerCase().includes(k.toLowerCase()))return v;
  return null;
}

async function fetchAPI(){
  try{
    const r=await fetch("/.netlify/functions/results");
    if(!r.ok)return false;
    const data=await r.json();
    (data.matches||[]).forEach(m=>{
      const j=m.matchday;
      if(!j||j<24||m.status!=="FINISHED")return;
      const jo=j-24;if(jo>10)return;
      const home=mapTeam(m.homeTeam.name),away=mapTeam(m.awayTeam.name);
      const sh=m.score?.fullTime?.home,sa=m.score?.fullTime?.away;
      if(sh==null||sa==null)return;
      if(home){R[home][jo]=sh>sa?"V":sh<sa?"D":"N";L[home][jo]=true;}
      if(away){R[away][jo]=sa>sh?"V":sa<sh?"D":"N";L[away][jo]=true;}
    });
    DUELS.forEach(([a,b,j])=>{
      const master=CLUBS.indexOf(a)<CLUBS.indexOf(b)?a:b;
      const slave=master===a?b:a;
      if(R[master][j]&&L[master][j]){
        const inv=R[master][j]==="V"?"D":R[master][j]==="D"?"V":"N";
        R[slave][j]=inv;L[slave][j]=true;
      }
    });
    return true;
  }catch(e){return false;}
}

// ═══════════════════════════════════════════════
// CALENDRIER
// ═══════════════════════════════════════════════

let openPop=null;
document.addEventListener("click",e=>{if(!e.target.closest(".cell")&&!e.target.closest(".popup"))closePop();});
function closePop(){if(openPop){openPop.remove();openPop=null;}}

function rc(r){return r==="V"?"win":r==="N"?"draw":r==="D"?"loss":"";}
function rl(r){return r||"";}

function setRes(club,j,val){
  if(L[club][j])return;
  const prev={};CLUBS.forEach(c=>prev[c]=calcPts(c));
  R[club][j]=val;
  const mir=CAL[club][j].m;
  if(mir&&!L[mir][j]){
    R[mir][j]=val==="V"?"D":val==="D"?"V":val==="N"?"N":null;
    refreshCell(mir,j);
  }
  refreshCell(club,j);
  saveStorage();
  renderRanking(true,prev);
  updateChart();
}

function refreshCell(club,j){
  const el=document.getElementById("c"+club+j);
  if(!el)return;
  const r=R[club][j],lk=L[club][j],mir=!isMaster(club,j);
  el.className="cell "+rc(r)+(!lk?" clickable":"")+(!lk&&mir&&!r?" mirror":"");
  el.querySelector(".c-res").textContent=rl(r);
}

function buildCalendar(){
  const grid=document.getElementById("cal-grid");
  grid.innerHTML="";

  // Corner
  const corner=document.createElement("div");
  corner.className="ch corner jlabel";
  grid.appendChild(corner);

  // Headers clubs
  CLUBS.forEach(club=>{
    const el=document.createElement("div");
    el.className="ch";
    el.innerHTML=crestImg(club,24)+'<span class="ch-name">'+club+'</span><span class="ch-pts" id="chpts-'+club+'">'+PTS0[club]+'</span>';
    grid.appendChild(el);
  });

  // Lignes journées
  JJ.forEach((jj,jOff)=>{
    const jl=document.createElement("div");
    jl.className="jlabel";
    jl.innerHTML='<span class="jn">'+jj.id+'</span><span class="jd">'+jj.d+'</span>';
    grid.appendChild(jl);

    CLUBS.forEach(club=>{
      const cal=CAL[club][jOff];
      const r=R[club][jOff],lk=L[club][jOff],mir=!isMaster(club,jOff);
      const cell=document.createElement("div");
      cell.id="c"+club+jOff;
      cell.className="cell "+rc(r)+(!lk?" clickable":"")+(!lk&&mir&&!r?" mirror":"");

      // Pour le blason : si l'adversaire s'appelle "Marseille" dans le calendrier, on cherche "OM"
      const advKey = cal.a==="Marseille"?"OM":cal.a==="OM"?"OM":cal.a;
      const haEmoji = cal.h==="H"?"🏠":"✈️";

      cell.innerHTML=
        '<span class="c-ha">'+haEmoji+'</span>'+
        crestImg(advKey,26)+
        '<span class="c-adv">'+cal.a+'</span>'+
        '<span class="c-res">'+rl(r)+'</span>';

      if(!lk){
        cell.addEventListener("click",e=>{
          e.stopPropagation();closePop();
          const pop=document.createElement("div");
          pop.className="popup";
          pop.innerHTML='<button class="pb v">V</button><button class="pb n">N</button><button class="pb d">D</button><button class="pb x">✕</button>';
          pop.querySelector(".v").onclick=ev=>{ev.stopPropagation();setRes(club,jOff,"V");closePop();};
          pop.querySelector(".n").onclick=ev=>{ev.stopPropagation();setRes(club,jOff,"N");closePop();};
          pop.querySelector(".d").onclick=ev=>{ev.stopPropagation();setRes(club,jOff,"D");closePop();};
          pop.querySelector(".x").onclick=ev=>{ev.stopPropagation();setRes(club,jOff,null);closePop();};
          cell.appendChild(pop);openPop=pop;
        });
      }
      grid.appendChild(cell);
    });
  });
}

// ═══════════════════════════════════════════════
// CLASSEMENT
// ═══════════════════════════════════════════════

let prevRank=[],prevP={};
const ZONE_CLS=["z-cl","z-cl","z-cl","z-cl4","z-el","z-conf"];

function renderRanking(animate,prev){
  animate=animate||false;prev=prev||{};
  const list=document.getElementById("rank-list");
  const s=sorted();

  s.forEach((club,i)=>{
    const pts=calcPts(club);
    let el=document.getElementById("ri-"+club);
    if(!el){el=document.createElement("div");el.id="ri-"+club;list.appendChild(el);}
    const rank=i+1;
    const nc=rank===1?"g":rank===2?"s":rank===3?"b":"";
    el.className="ri "+(ZONE_CLS[i]||"");
    el.innerHTML=
      '<div class="ri-num '+nc+'">'+rank+'</div>'+
      crestImg(club,20)+
      '<div class="ri-name">'+META[club].name+'</div>'+
      '<div class="ri-pts" id="rp-'+club+'">'+pts+'</div>';

    const diff=animate&&prev[club]!==undefined?pts-prev[club]:0;
    if(diff>0){
      const pEl=document.getElementById("rp-"+club);
      pEl.classList.remove("bump");void pEl.offsetWidth;pEl.classList.add("bump");
      const b=document.createElement("span");b.className="badge";b.textContent="+"+diff;
      pEl.appendChild(b);setTimeout(()=>b.remove(),1700);
    }

    const pi=prevRank.indexOf(club);
    if(animate&&pi!==-1&&pi!==i){
      const dy=(pi-i)*34;
      el.style.transition="none";el.style.transform="translateY("+dy+"px)";
      requestAnimationFrame(()=>{
        el.style.transition="transform .55s cubic-bezier(0.34,1.56,0.64,1)";
        el.style.transform="translateY(0)";
      });
    }
  });

  s.forEach(club=>list.appendChild(document.getElementById("ri-"+club)));
  CLUBS.forEach(c=>{const el=document.getElementById("chpts-"+c);if(el)el.textContent=calcPts(c);});
  prevRank=s;prevP={};CLUBS.forEach(c=>prevP[c]=calcPts(c));
}

// ═══════════════════════════════════════════════
// GRAPHIQUE
// ═══════════════════════════════════════════════

let chart=null;
const CHART_COLORS={PSG:"#3b82f6",Lens:"#ef4444",Lyon:"#6366f1",OM:"#0ea5e9",Lille:"#8b5cf6",Rennes:"#f59e0b",Strasbourg:"#14b8a6",Monaco:"#f43f5e"};

function chartData(){
  const labels=["J23",...JJ.map(j=>j.id)];
  const datasets=CLUBS.map(club=>{
    const pts=[PTS0[club]];let cum=PTS0[club];
    for(let i=0;i<11;i++){const r=R[club][i];if(r==="V")cum+=3;else if(r==="N")cum+=1;pts.push(cum);}
    return{label:club,data:pts,borderColor:CHART_COLORS[club],backgroundColor:"transparent",borderWidth:1.5,pointRadius:2,pointHoverRadius:4,tension:0.3};
  });
  return{labels,datasets};
}

function initChart(){
  const ctx=document.getElementById("pts-chart").getContext("2d");
  const{labels,datasets}=chartData();
  chart=new Chart(ctx,{
    type:"line",data:{labels,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,animation:{duration:300},
      interaction:{mode:"index",intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{backgroundColor:"#1c2030",borderColor:"rgba(255,255,255,0.08)",borderWidth:1,titleColor:"#fff",bodyColor:"rgba(221,225,236,0.6)",padding:8,callbacks:{label:c=>" "+c.dataset.label+": "+c.raw+"pts"}}
      },
      scales:{
        x:{grid:{color:"rgba(255,255,255,0.03)"},ticks:{color:"rgba(221,225,236,0.35)",font:{size:9}}},
        y:{grid:{color:"rgba(255,255,255,0.03)"},ticks:{color:"rgba(221,225,236,0.35)",font:{size:9}}}
      }
    }
  });
  const leg=document.getElementById("chart-legend");
  CLUBS.forEach(c=>{leg.innerHTML+='<div class="leg">'+crestImg(c,12)+" "+META[c].name+'</div>';});
}

function updateChart(){
  if(!chart)return;
  const{labels,datasets}=chartData();
  chart.data.labels=labels;chart.data.datasets=datasets;chart.update("active");
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════

async function init(){
  loadStorage();
  const ok=await fetchAPI();
  loadStorage();
  buildCalendar();
  renderRanking(false,{});
  initChart();
  const now=new Date();
  document.getElementById("status-txt").textContent=
    (ok?"API en direct · ":"Hors ligne · ")+
    now.toLocaleDateString("fr-FR")+" "+now.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
  setTimeout(()=>document.getElementById("loader").classList.add("gone"),1300);
}
init();
